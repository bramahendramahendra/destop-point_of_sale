<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manajemen Supplier - POS Retail</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="dashboard-page">
  <!-- Navbar -->
  <nav class="navbar"></nav>

  <div class="dashboard-container">
    <!-- Sidebar -->
    <aside class="sidebar"></aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="content-header">
        <h1>Manajemen Supplier</h1>
        <button class="btn btn-primary" id="btnAddSupplier">
          <span>➕</span> Tambah Supplier
        </button>
      </div>

      <!-- Filters -->
      <div class="filters-container">
        <div class="search-box">
          <input
            type="text"
            id="searchInput"
            placeholder="🔍 Cari nama, kode, telepon, atau kontak..."
            class="search-input"
          >
        </div>
        <div class="filter-group">
          <select id="filterStatus" class="filter-select">
            <option value="">Semua Status</option>
            <option value="1">Aktif</option>
            <option value="0">Nonaktif</option>
          </select>
          <button class="btn btn-secondary" id="btnApplyFilter">Filter</button>
          <button class="btn btn-secondary" id="btnResetFilter">Reset</button>
        </div>
      </div>

      <!-- Summary -->
      <div class="summary-card">
        <div class="summary-item">
          <span>Total Supplier:</span>
          <strong id="statTotal">0</strong>
        </div>
        <div class="summary-item">
          <span>Aktif:</span>
          <strong id="statActive" class="text-success">0</strong>
        </div>
        <div class="summary-item">
          <span>Nonaktif:</span>
          <strong id="statInactive" class="text-danger">0</strong>
        </div>
      </div>

      <!-- Suppliers Table -->
      <div class="table-container">
        <table class="data-table" id="suppliersTable">
          <thead>
            <tr>
              <th>Kode</th>
              <th>Nama Supplier</th>
              <th>Kontak Person</th>
              <th>Telepon</th>
              <th>Email</th>
              <th>Status</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="suppliersTableBody">
            <tr>
              <td colspan="7" class="text-center">Loading...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Modal Add/Edit Supplier -->
  <div id="supplierModal" class="modal">
    <div class="modal-content modal-large">
      <div class="modal-header">
        <h2 id="supplierModalTitle">Tambah Supplier</h2>
        <button class="modal-close" id="closeSupplierModal">&times;</button>
      </div>
      <div class="modal-body">
        <form id="supplierForm">
          <input type="hidden" id="supplierId">

          <div class="form-row">
            <div class="form-group">
              <label for="supplierCode">Kode Supplier</label>
              <input type="text" id="supplierCode" readonly class="readonly-input"
                placeholder="Auto-generate">
            </div>
            <div class="form-group">
              <label for="supplierName">Nama Supplier <span class="required">*</span></label>
              <input type="text" id="supplierName" placeholder="Masukkan nama supplier" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="supplierPhone">Nomor Telepon</label>
              <input type="text" id="supplierPhone" placeholder="Contoh: 08123456789">
            </div>
            <div class="form-group">
              <label for="supplierEmail">Email</label>
              <input type="email" id="supplierEmail" placeholder="contoh@email.com">
            </div>
          </div>

          <div class="form-group">
            <label for="supplierContact">Nama Kontak Person</label>
            <input type="text" id="supplierContact" placeholder="Nama penanggung jawab">
          </div>

          <div class="form-group">
            <label for="supplierAddress">Alamat</label>
            <textarea id="supplierAddress" rows="3" placeholder="Alamat lengkap supplier"></textarea>
          </div>

          <div class="form-group">
            <label for="supplierNotes">Keterangan</label>
            <textarea id="supplierNotes" rows="2" placeholder="Keterangan tambahan (opsional)"></textarea>
          </div>

          <div id="supplierFormError" class="error-message hidden"></div>

          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" id="btnCancelSupplier">Batal</button>
            <button type="submit" class="btn btn-primary" id="btnSubmitSupplier">
              <span id="btnSubmitSupplierText">Simpan</span>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Modal Detail Supplier -->
  <div id="supplierDetailModal" class="modal">
    <div class="modal-content modal-extra-large">
      <div class="modal-header">
        <h2 id="detailModalTitle">Detail Supplier</h2>
        <button class="modal-close" id="closeDetailModal">&times;</button>
      </div>
      <div class="modal-body">

        <!-- Info Supplier -->
        <div class="detail-section" id="detailInfoSection">
          <!-- Populated dynamically -->
        </div>

        <!-- Ringkasan Hutang -->
        <div class="detail-section mt-20" id="detailDebtSection">
          <!-- Populated dynamically -->
        </div>

        <!-- Riwayat Pembelian -->
        <div class="detail-section mt-20">
          <h3 class="detail-section-title">Riwayat Pembelian</h3>
          <div class="table-container">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Kode PO</th>
                  <th>Tanggal</th>
                  <th>Total</th>
                  <th>Dibayar</th>
                  <th>Sisa Hutang</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="detailPurchaseBody">
                <tr><td colspan="6" class="text-center">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="btnCloseDetail">Tutup</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/utils.js"></script>
  <script src="../js/menu.js"></script>
  <script src="../js/notification.js"></script>
  <script src="../js/suppliers.js"></script>
</body>
</html>
